<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinícius Caetano | IA & Digital Branding</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .profile-img {
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00f2fe;
            margin-bottom: 15px; box-shadow: 0 0 20px #00f2fe;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 1px; }
        p { font-size: 0.9rem; color: #aaa; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; text-decoration: none; color: white; border-radius: 12px;
            font-weight: 500; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .link-card:hover {
            background: #00f2fe; color: #000; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }
        .socials { margin-top: 40px; display: flex; justify-content: center; gap: 20px; font-size: 1.5rem; }
        .socials a { color: #aaa; transition: 0.3s; }
        .socials a:hover { color: #00f2fe; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/vn-24k.png" alt="Vinícius" class="profile-img">
        <h1>Vinícius Caetano</h1>
        <p>Estrategista Digital & Especialista em IA</p>
        
        <div class="links">
            <a href="https://meu-site-ai-coral.vercel.app/" class="link-card" target="_blank">
                <i class="fas fa-robot"></i> Meu Portfólio de IA
            </a>
            <a href="#" class="link-card">
                <i class="fab fa-whatsapp"></i> Consultoria via WhatsApp
            </a>
            <a href="#" class="link-card">
                <i class="fab fa-tiktok"></i> Me acompanhe no TikTok
            </a>
            <a href="#" class="link-card">
                <i class="fas fa-envelope"></i> Contato Profissional
            </a>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
    </div>
</body>
</html>
