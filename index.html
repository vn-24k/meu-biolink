<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinícius Caetano | IA & Digital Branding</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #4facfe;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            /* Mesh Gradient de fundo para profundidade */
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 254, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 172, 254, 0.05) 0px, transparent 50%);
            color: white; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 420px; 
            padding: 40px 20px;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 2px solid var(--glass-border);
            position: relative;
            z-index: 2;
            object-fit: cover;
        }

        /* Efeito de brilho pulsante atrás da foto */
        .profile-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            filter: blur(25px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: 1;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 0.3; }
        }

        h1 { 
            font-size: 1.7rem; 
            font-weight: 700;
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 0.95rem; 
            color: #888; 
            margin-bottom: 35px; 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .links { display: flex; flex-direction: column; gap: 16px; }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 18px; 
            text-decoration: none; 
            color: #efefef; 
            border-radius: 16px;
            font-weight: 500; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center; 
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho ao passar o mouse */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-card:hover::before { left: 100%; }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: scale(1.02);
            color: #fff;
        }

        .socials { 
            margin-top: 50px; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
        }

        .socials a { 
            color: #555; 
            font-size: 1.4rem;
            transition: 0.3s; 
        }

        .socials a:hover { 
            color: var(--primary); 
            transform: translateY(-5px);
        }

        /* Badge de "Online/Disponível" */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="dot"></span> DISPONÍVEL PARA PROJETOS
        </div>
        
        <div class="profile-wrapper">
            <img src="https://github.com/vn-24k.png" alt="Vinícius" class="profile-img">
        </div>

        <h1>Vinícius Caetano</h1>
        <p>AI Strategist • Digital Branding</p>
        
        <div class="links">
            <a href="https://meu-site-ai-coral.vercel.app/" class="link-card" target="_blank">
                <i class="fas fa-microchip"></i> Portfólio de IA 2026
            </a>
            <a href="#" class="link-card">
                <i class="fab fa-whatsapp"></i> Consultoria Estratégica
            </a>
            <a href="#" class="link-card">
                <i class="fab fa-tiktok"></i> Insights no TikTok
            </a>
            <a href="#" class="link-card">
                <i class="fas fa-envelope-open-text"></i> Contato Direto
            </a>
        </div>

        <div class="socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
</body>
</html>
